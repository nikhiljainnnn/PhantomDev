---
# Traefik Ingress — routes all traffic through phantomdev-nginx
# Nginx handles:
#   /api/* → strips prefix → proxies to phantomdev-api:8000
#   /ws/*  → WebSocket upgrade → proxies to phantomdev-api:8000
#   /*     → serves React frontend (SPA with fallback to index.html)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phantomdev-ingress
  namespace: phantomdev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: phantomdev-nginx
                port:
                  number: 80
