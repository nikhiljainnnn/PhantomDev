---
# PersistentVolumeClaim — Redis data survives pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: phantomdev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phantomdev-redis
  namespace: phantomdev
  labels:
    app: phantomdev-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phantomdev-redis
  template:
    metadata:
      labels:
        app: phantomdev-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly yes
            - --maxmemory 512mb
            - --maxmemory-policy allkeys-lru
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "600Mi"
              cpu: "300m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc

---
# Redis Service — other pods connect via "phantomdev-redis:6379"
apiVersion: v1
kind: Service
metadata:
  name: phantomdev-redis
  namespace: phantomdev
spec:
  selector:
    app: phantomdev-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP  # Internal only, not exposed outside cluster
