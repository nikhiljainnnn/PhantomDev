---
# HPA for API — scales 2→10 pods based on CPU usage
# When CPU > 70%, K8s adds more API pods automatically
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: phantomdev-api-hpa
  namespace: phantomdev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: phantomdev-api
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Scale up when avg CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # Scale up when avg memory > 80%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # Wait 30s before scaling up again
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60            # Add max 2 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60            # Remove max 1 pod per minute

---
# HPA for Celery Workers — scales based on CPU
# In production you'd use KEDA to scale based on Redis queue depth
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: phantomdev-worker-hpa
  namespace: phantomdev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: phantomdev-worker
  minReplicas: 1
  maxReplicas: 10    # Max 10 concurrent pipelines
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # Workers are CPU-heavy, scale earlier
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15   # Scale up fast (pipeline queue building)
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 600  # Scale down slowly (pipelines take time)
