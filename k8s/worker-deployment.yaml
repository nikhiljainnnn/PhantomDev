---
# Celery Worker Deployment
# Workers pick up pipeline tasks from Redis queue
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phantomdev-worker
  namespace: phantomdev
  labels:
    app: phantomdev-worker
spec:
  replicas: 1          # RWO PVCs (workspace/chroma) can only be mounted by 1 pod at a time
  selector:
    matchLabels:
      app: phantomdev-worker
  template:
    metadata:
      labels:
        app: phantomdev-worker
    spec:
      # Give running pipeline tasks time to finish before pod is killed
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: phantomdev:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - worker.celery_app
            - worker
            - --loglevel=info
            - --concurrency=1   # 1 pipeline per worker pod (LLM is the bottleneck)
            - -Q
            - pipeline
          envFrom:
            - configMapRef:
                name: phantomdev-config
            - secretRef:
                name: phantomdev-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: workspace
              mountPath: /app/workspace
            - name: chroma
              mountPath: /app/data/chroma
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - worker.celery_app
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 15    # 'celery inspect ping' is slow — must exceed default 1s
            failureThreshold: 3
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: workspace-pvc
        - name: chroma
          persistentVolumeClaim:
            claimName: chroma-pvc
