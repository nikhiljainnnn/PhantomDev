apiVersion: v1
kind: Secret
metadata:
  name: phantomdev-secrets
  namespace: phantomdev
type: Opaque
stringData:
  # Replace these with your actual values before applying
  GITHUB_TOKEN: "ghp_your_token_here"
  TARGET_REPO: "your_username/your_repo"
  PHANTOMDEV_API_KEY: "your_api_key_here"
  GROQ_API_KEY: ""
  LANGCHAIN_API_KEY: ""

# NOTE: In production, use:
# kubectl create secret generic phantomdev-secrets \
#   --from-env-file=.env \
#   --namespace=phantomdev
# This avoids committing secrets to git.
# Add secrets.yaml to .gitignore!
