---
# Nginx ConfigMap — serves React frontend + proxies API
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: phantomdev
data:
  default.conf: |
    upstream phantomdev_api {
        server phantomdev-api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript;

        # React frontend
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass         http://phantomdev_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # WebSocket proxy
        location /ws/ {
            proxy_pass         http://phantomdev_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        location /health {
            proxy_pass http://phantomdev_api/health;
            access_log off;
        }
    }

---
# Nginx Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phantomdev-nginx
  namespace: phantomdev
  labels:
    app: phantomdev-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phantomdev-nginx
  template:
    metadata:
      labels:
        app: phantomdev-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: frontend
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: frontend
          emptyDir: {}
      initContainers:
        # Copy built frontend into the nginx volume on startup
        - name: copy-frontend
          image: phantomdev:latest
          imagePullPolicy: IfNotPresent   # Use local image — phantomdev is not on Docker Hub
          command: ["cp", "-r", "/app/frontend/dist/.", "/html/"]
          volumeMounts:
            - name: frontend
              mountPath: /html

---
# Nginx Service — exposed externally via LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: phantomdev-nginx
  namespace: phantomdev
spec:
  selector:
    app: phantomdev-nginx
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer   # k3d maps this to localhost:80
