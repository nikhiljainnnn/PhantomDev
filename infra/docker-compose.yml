version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: phantomdev-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - internal

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: /bin/sh -c "ollama pull ${OLLAMA_MODEL:-qwen2.5-coder:7b} && echo done"
    restart: "no"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: phantomdev-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: phantomdev-api
    volumes:
      - workspace_data:/app/workspace
      - chroma_data:/app/data/chroma
      - sandbox_data:/app/sandbox
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - TARGET_REPO=${TARGET_REPO:-}
      - PHANTOMDEV_API_KEY=${PHANTOMDEV_API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - USE_CELERY=true
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - WORKSPACE_DIR=/app/workspace
      - SANDBOX_DIR=/app/sandbox
      - MIN_COVERAGE=${MIN_COVERAGE:-70}
      - MAX_ENGINEERS=${MAX_ENGINEERS:-3}
      - AGENT_TIMEOUT=${AGENT_TIMEOUT:-180}
      - MAX_ROUNDS=${MAX_ROUNDS:-40}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_PROJECT=phantomdev
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: phantomdev-worker
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2 -Q pipeline
    volumes:
      - workspace_data:/app/workspace
      - chroma_data:/app/data/chroma
      - sandbox_data:/app/sandbox
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - TARGET_REPO=${TARGET_REPO:-}
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - WORKSPACE_DIR=/app/workspace
      - SANDBOX_DIR=/app/sandbox
      - MIN_COVERAGE=${MIN_COVERAGE:-70}
      - MAX_ENGINEERS=${MAX_ENGINEERS:-3}
      - AGENT_TIMEOUT=${AGENT_TIMEOUT:-180}
      - MAX_ROUNDS=${MAX_ROUNDS:-40}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  flower:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: phantomdev-flower
    command: celery -A worker.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-phantomdev}
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - internal
      - public

  nginx:
    image: nginx:1.27-alpine
    container_name: phantomdev-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.http.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - internal
      - public

volumes:
  ollama_data:
  redis_data:
  workspace_data:
  chroma_data:
  sandbox_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge
