version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: phantomdev-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phantomdev

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: phantomdev-api
    volumes:
      - workspace_data:/app/workspace
      - chroma_data:/app/data/chroma
      - sandbox_data:/app/sandbox
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - TARGET_REPO=${TARGET_REPO:-}
      - PHANTOMDEV_API_KEY=${PHANTOMDEV_API_KEY:-}
      - ALLOWED_ORIGINS=*
      - USE_CELERY=false
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - WORKSPACE_DIR=/app/workspace
      - SANDBOX_DIR=/app/sandbox
      - MIN_COVERAGE=${MIN_COVERAGE:-70}
      - MAX_ENGINEERS=${MAX_ENGINEERS:-2}
      - AGENT_TIMEOUT=${AGENT_TIMEOUT:-180}
      - MAX_ROUNDS=${MAX_ROUNDS:-40}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - phantomdev

  nginx:
    image: nginx:1.27-alpine
    container_name: phantomdev-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.http.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - phantomdev

volumes:
  redis_data:
  workspace_data:
  chroma_data:
  sandbox_data:

networks:
  phantomdev:
    driver: bridge
